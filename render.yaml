services:
  - type: web
    name: toneadjust-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DOWNLOAD_DIR
        value: /tmp/downloads
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/toneadjust.db
    healthCheckPath: /api/songs
